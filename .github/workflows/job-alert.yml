name: Job Alert Scan

on:
  schedule:
    # Every 5 minutes (GitHub Actions minimum interval)
    - cron: '*/5 * * * *'
  workflow_dispatch:  # manual trigger from GitHub Actions tab

concurrency:
  group: job-alert-scan
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scan:
    name: Scan LinkedIn & Indeed
    runs-on: ubuntu-22.04   # pinned: ubuntu-latest (24.04) breaks Playwright's libasound2 dep
    timeout-minutes: 12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r cloud/requirements.txt

      - name: Run job alert worker
        run: python cloud/worker.py
        env:
          KEYWORDS:            ${{ secrets.KEYWORDS }}
          LOCATION:            ${{ secrets.LOCATION }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          MAX_HOURS:           ${{ secrets.MAX_HOURS }}
          LINKEDIN_COOKIE:     ${{ secrets.LINKEDIN_COOKIE }}
          HIDE_APPLIED:        ${{ secrets.HIDE_APPLIED }}
          SEARCH_LINKEDIN:     ${{ secrets.SEARCH_LINKEDIN }}
          SEARCH_INDEED:       ${{ secrets.SEARCH_INDEED }}
          SEARCH_ADZUNA:       ${{ secrets.SEARCH_ADZUNA }}
          ADZUNA_APP_ID:       ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:      ${{ secrets.ADZUNA_APP_KEY }}
          SEARCH_WEB:          ${{ secrets.SEARCH_WEB }}
          TAVILY_API_KEY:      ${{ secrets.TAVILY_API_KEY }}
          BRAVE_API_KEY:       ${{ secrets.BRAVE_API_KEY }}
          GOOGLE_API_KEY:      ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CX:           ${{ secrets.GOOGLE_CX }}
          BING_API_KEY:        ${{ secrets.BING_API_KEY }}
