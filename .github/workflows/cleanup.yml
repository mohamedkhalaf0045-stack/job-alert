name: Data Cleanup

on:
  schedule:
    - cron: '0 2 * * 0'   # every Sunday 02:00 UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print counts, delete nothing)'
        required: false
        default: 'false'

concurrency:
  group: cleanup
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: cloud/requirements.txt

      - name: Install dependencies
        run: pip install -r cloud/requirements.txt

      - name: Run cleanup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            FLAGS="--dry-run"
          fi
          python cloud/cleanup.py $FLAGS
