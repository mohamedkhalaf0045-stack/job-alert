name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > mobile/android/app/job-alert-key.jks

      - name: Write key.properties
        run: |
          cat > mobile/android/key.properties <<EOF
          storePassword=${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=job-alert-key.jks
          EOF

      - name: Flutter pub get
        working-directory: mobile
        run: flutter pub get

      - name: Build APKs (split per ABI)
        working-directory: mobile
        # GH_PAT = a GitHub fine-grained PAT with Actions: Read & Write permission.
        # Add it as a repo secret named GH_PAT so the Cloud tab works in the APK.
        # The app also reads setting_github_token from Supabase at runtime, so you
        # can update the token without rebuilding the APK.
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=GITHUB_TOKEN=${{ secrets.GH_PAT }} \
            --dart-define=WEB_APP_URL=${{ secrets.WEB_APP_URL }}

      - name: Resolve tag name
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "name=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            VER=$(grep '^version:' mobile/pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
            echo "name=v${VER}-dev" >> $GITHUB_OUTPUT
          fi

      - name: Upload APKs to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: "Job Alert ${{ steps.tag.outputs.name }}"
          draft: false
          prerelease: false
          files: |
            mobile/build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            mobile/build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            mobile/build/app/outputs/flutter-apk/app-x86_64-release.apk
